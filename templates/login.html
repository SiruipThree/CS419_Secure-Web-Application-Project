{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="panel auth-panel">
  <h1>Login</h1>
  <p class="panel-subtitle">Secure sign-in with rate limiting, account lockout, and session protections.</p>
  {% if error %}
  <div class="status-banner status-error">
    <strong>Sign-in failed</strong>
    {{ error }}
  </div>
  {% endif %}
  <form class="form-grid" method="post">
    <label>
      Username or Email
      <input type="text" name="identifier" autocomplete="username" value="{{ identifier_value }}">
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="current-password">
    </label>
    <button class="button" type="submit">Sign In</button>
  </form>
</section>
{% endblock %}
