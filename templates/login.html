{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="panel">
  <h1>Login</h1>
  <p>Starter page for secure authentication with lockout and rate limiting.</p>
  {% if error %}
  <p>{{ error }}</p>
  {% endif %}
  <form class="form-grid" method="post">
    <label>
      Username or Email
      <input type="text" name="identifier" autocomplete="username" value="{{ identifier_value }}">
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="current-password">
    </label>
    <button class="button" type="submit">Sign In</button>
  </form>
</section>
{% endblock %}
