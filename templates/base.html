<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Secure Document Sharing{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div class="shell nav-row">
        <a class="brand" href="{{ url_for('index') }}">SecureShare</a>
        <nav class="nav-links">
          <a href="{{ url_for('index') }}">Home</a>
          <a href="{{ url_for('dashboard') }}">Dashboard</a>
          <a href="{{ url_for('upload') }}">Upload</a>
          <a href="{{ url_for('shared') }}">Shared</a>
          <a href="{{ url_for('admin') }}">Admin</a>
        </nav>
      </div>
    </header>

    <main class="shell page-content">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="shell">
        <p>CS 419 secure document sharing scaffold.</p>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
