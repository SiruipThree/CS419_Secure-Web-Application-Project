{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="panel auth-panel">
  <h1>Create Account</h1>
  <p class="panel-subtitle">Create a secure account to upload, share, and manage confidential documents.</p>
  {% if error %}
  <div class="status-banner status-error">
    <strong>Registration failed</strong>
    {{ error }}
  </div>
  {% endif %}
  <form class="form-grid" method="post">
    <label>
      Username
      <input type="text" name="username" autocomplete="username" value="{{ username_value }}">
    </label>
    <label>
      Email
      <input type="email" name="email" autocomplete="email" value="{{ email_value }}">
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="new-password">
    </label>
    <label>
      Confirm Password
      <input type="password" name="confirm_password" autocomplete="new-password">
    </label>
    <button class="button" type="submit">Create Account</button>
  </form>
</section>
{% endblock %}
