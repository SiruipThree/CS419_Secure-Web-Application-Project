{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="panel">
  <h1>Create Account</h1>
  <p>Registration form scaffold aligned with the assignment password policy.</p>
  {% if error %}
  <p>{{ error }}</p>
  {% endif %}
  <form class="form-grid" method="post">
    <label>
      Username
      <input type="text" name="username" autocomplete="username" value="{{ username_value }}">
    </label>
    <label>
      Email
      <input type="email" name="email" autocomplete="email" value="{{ email_value }}">
    </label>
    <label>
      Password
      <input type="password" name="password" autocomplete="new-password">
    </label>
    <label>
      Confirm Password
      <input type="password" name="confirm_password" autocomplete="new-password">
    </label>
    <button class="button" type="submit">Create Account</button>
  </form>
</section>
{% endblock %}
